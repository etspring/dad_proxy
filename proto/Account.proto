syntax = "proto2";

import "_Item.proto";
import "_Character.proto";
import "Common.proto";
package DC.Packet;
option go_package = "dad_proxy/internal/pb";

message SLOGIN_ACCOUNT_INFO {
  optional string AccountID = 1;
}

message SLOGIN_CHARACTER_INFO {
  optional int32 orderIndex = 1;
  optional string characterId = 2;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 3;
  optional string characterClass = 4;
  optional uint64 createAt = 5;
  optional uint32 gender = 6;
  optional uint32 level = 7;
  optional uint64 lastloginDate = 8;
  repeated .DC.Packet.SItem equipItemList = 9;
  repeated string equipCharacterSkinList = 10;
  repeated string equipItemSkinList = 11;
  repeated string equipArmorSkinList = 12;
  optional uint32 isLock = 13;
  optional uint32 orderId = 14;
}

message SFINGER_PRINT_INFO {
  optional string clientIp = 1;
  optional uint32 screenW = 2;
  optional uint32 screenH = 3;
  optional string osVersion = 4;
  optional string language = 5;
  optional string region = 6;
  optional uint32 coreCount = 7;
  optional string gpuModel = 8;
}

message SC2S_ACCOUNT_LOGIN_REQ {
  optional string loginId = 1;
  optional string password = 2;
  optional string ipAddress = 3;
  optional uint32 steamBuildId = 4;
  repeated string hwIds = 5;
  optional string macAddress = 6;
  optional uint32 platformId = 7;
  optional string buildVersion = 8;
  optional string eulaHash = 9;
  optional .DC.Packet.SFINGER_PRINT_INFO fingerPrint = 10;
  optional uint32 securityEnabled = 11;
}

message SS2C_ACCOUNT_LOGIN_RES {
  enum RESULT {
    RESULT_NONE = 0;
    SUCCESS = 1;
    SUCCESS_FIRST = 2;
    FAIL_PASSWORD = 3;
    FAIL_CONNECT = 4;
    FAIL_SHORT_ID_OR_PASSWORD = 5;
    FAIL_OVERFLOW_ID_OR_PASSWORD = 6;
    FAIL_IP_PORT = 7;
    FAIL_OVERLAP_LOGIN = 8;
    FAIL_STEAM_BUILD_ID = 11;
    FAIL_BAN = 12;
    FAIL_LOGIN_BAN_HARDWARE = 16;
    FAIL_UNDER_MAINTENANCE = 17;
    FAIL_BUILD_VERSION_ID = 41;
    SUCCESS_AGREE_CHECK_RES = 51;
    FAIL_EPIC_MIGRATION_POST_LOGIN = 60;
  }
  enum EulaAgreementStatus {
    NONE = 0;
    AGREEMENT = 1;
    DISAGREE = 2;
  }
  enum SecurityStatus {
    SECURITY_NONE = 0;
    SECURITY_INACTIVE = 1;
    SECURITY_ACTIVE = 2;
  }
  optional uint32 Result = 1;
  optional .DC.Packet.SLOGIN_ACCOUNT_INFO AccountInfo = 2;
  optional uint32 isReconnect = 3;
  optional string address = 4;
  optional string sessionId = 5;
  optional string accountId = 6;
  optional uint32 serverLocation = 7;
  optional string secretToken = 8;
  optional uint64 banTime_begin_ms = 9;
  optional uint64 banTime_end_ms = 10;
  optional string upgradeDate = 11;
  optional string upgradeTime = 12;
  optional string banReason = 13;
  optional string latencyToken = 14;
  optional uint64 totalPlaytime = 15;
  optional int32 userLoginInfo = 16;
  optional int32 usePlatformLink = 17;
  optional .DC.Packet.ACCOUNT_REDIRECTION_INFO redirectionInfo = 18;
  optional int32 gameType = 19;
  optional int32 linkPlatformLinkStatus = 20;
  optional int32 isLockBanAppeal = 21;
  optional int32 banPeriodType = 22;
  optional int32 eulaAgreementStatus = 23;
  optional int32 permission = 24;
  repeated .DC.Packet.SACCOUNT_DLC_INSTALL_INFO dlcInstallInfos = 25;
}

message SC2S_ACCOUNT_CHARACTER_CREATE_REQ {
  optional string nickName = 1;
  optional string characterClass = 2;
  optional uint32 gender = 3;
}

message SS2C_ACCOUNT_CHARACTER_CREATE_RES {
  optional uint32 result = 1;
}

message SC2S_ACCOUNT_CHARACTER_LIST_REQ {
  optional uint32 pageIndex = 1;
  optional uint32 pageCapacity = 2;
}

message SACCOUNT_CHARACTER_SLOT_INFO {
  optional int32 orderIndex = 1;
  optional uint32 slotType = 2;
  optional uint32 slotStatus = 3;
  optional uint32 expireTimeSec = 4;
}

message SS2C_ACCOUNT_CHARACTER_LIST_RES {
  optional uint32 totalCharacterCount = 1;
  optional uint32 pageIndex = 2;
  repeated .DC.Packet.SLOGIN_CHARACTER_INFO characterList = 3;
  repeated .DC.Packet.SACCOUNT_CHARACTER_SLOT_INFO slotInfos = 4;
  optional uint32 availableSlotCount = 5;
  optional uint64 wipeRemainTimeMs = 6;
}

message SC2S_ACCOUNT_CHARACTER_DELETE_REQ {
  optional string characterId = 1;
}

message SS2C_ACCOUNT_CHARACTER_DELETE_RES {
  optional uint32 result = 1;
  optional uint32 usePlatformLink = 2;
}

message SC2S_LOBBY_ENTER_REQ {
  optional string characterId = 1;
}

message SS2C_LOBBY_ENTER_RES {
  optional uint32 result = 1;
  optional string accountId = 2;
}

message SC2S_ACCOUNT_AGREE_ANSWER_REQ {
  optional uint32 isAgree = 1;
  optional string eulaHash = 2;
}

message SS2C_ACCOUNT_AGREE_ANSWER_RES {
  optional uint32 result = 1;
}

message SACCOUNT_CHARACTER_CLASS_INFO {
  optional string characterClassId = 1;
  optional string shopId = 2;
  optional uint32 isOwned = 3;
}

message SS2C_ACCOUNT_CHARACTER_CLASS_LIST_NOT {
  repeated .DC.Packet.SACCOUNT_CHARACTER_CLASS_INFO characterClassList = 1;
}

message SC2S_USER_HW_INFO_REQ {
  optional string os = 1;
  optional string cpu = 2;
  optional string gpu = 3;
  optional string gpuVersion = 4;
  optional string memory = 5;
  optional string storage = 6;
  optional string directX = 7;
  optional string osVersion = 8;
}

message SS2C_USER_HW_INFO_RES {
}

message ACCOUNT_REDIRECTION_INFO {
  optional string generalReportUrl = 1;
  optional string banAppealUrl = 2;
  optional string knightLinkUrl = 3;
  optional string supportFaqUrl = 4;
  optional string homeUrl = 5;
  optional string newsUrl = 6;
  optional string suggestionUrl = 7;
  optional string officialDiscordUrl = 8;
  optional string bugReportUrl = 9;
  optional string reportPlayerUrl = 10;
  optional string securitySettingsFaqUrl = 11;
}

message SC2S_ACCOUNT_SELECT_PLATFORM_LINK_REQ {
  optional int32 selectPlatformId = 1;
}

message SS2C_ACCOUNT_SELECT_PLATFORM_LINK_RES {
  optional uint32 result = 1;
}

message SC2S_PING_INFO_REQ {
}

message SS2C_PING_INFO_RES {
  optional uint32 result = 1;
  repeated string urls = 2;
  optional string authToken = 3;
  optional uint64 expiredMs = 4;
  optional uint32 tryPingCnt = 5;
}

message SS2C_PING_INFO_NOT {
  optional uint32 result = 1;
}

message SS2C_PING_CHECKING_NETWORK_NOT {
  optional uint32 result = 1;
}

message SS2C_PING_REGION_SELECT_NOT {
  optional uint32 result = 1;
  optional uint32 region = 2;
}

message SS2C_TRUSTED_ACCOUNT_INFO_NOT {
  optional uint32 result = 1;
  optional string enforcerRatingId = 2;
  optional int32 guiltyReportCount = 3;
  optional int32 judgedReportCount = 4;
  optional uint64 outlawReleaseTimeMs = 5;
  optional string badgeId = 6;
}

message SC2S_TRUSTED_ACCOUNT_INFO_REQ {
}

message SS2C_TRUSTED_ACCOUNT_INFO_RES {
  optional uint32 result = 1;
  optional string enforcerRatingId = 2;
  optional int32 guiltyReportCount = 3;
  optional int32 judgedReportCount = 4;
  optional uint64 outlawReleaseTimeMs = 5;
  optional string badgeId = 6;
}

message SC2S_NEWS_ENDPOINT_REQ {
}

message SS2C_NEWS_ENDPOINT_RES {
  optional uint32 result = 1;
  optional string allUrl = 2;
  optional string recentUrl = 3;
  optional string articleUrl = 4;
}

message SS2C_NEWS_NEW_ARTICLE_NOT {
}

message SC2S_NEWS_READ_ARTICLE_REQ {
  optional uint64 latestArticleId = 1;
}

message SS2C_NEWS_READ_ARTICLE_RES {
  optional uint32 result = 1;
}
