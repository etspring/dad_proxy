syntax = "proto2";

package DC.Packet;
option go_package = "dad_proxy/internal/pb";

message SCUSTOMIZE_BASE_INFO {
  optional uint32 customizeType = 1;
  optional string customizeId = 2;
  optional uint32 isEquip = 3;
  optional int32 equipSlotIndex = 4;
}

message SC2S_CUSTOMIZE_INFO_REQ {
}

message SS2C_CUSTOMIZE_INFO_RES {
  optional uint32 loopFlag = 1;
  repeated .DC.Packet.SCUSTOMIZE_BASE_INFO infos = 2;
}

message SC2S_CUSTOMIZE_MOUNT_REQ {
  optional uint32 customizeType = 1;
  optional string customizeId = 2;
  optional uint32 equipSlotIndex = 3;
}

message SS2C_CUSTOMIZE_MOUNT_RES {
  optional uint32 result = 1;
  optional uint32 customizeType = 2;
  repeated .DC.Packet.SCUSTOMIZE_BASE_INFO infos = 3;
}

message SC2S_CUSTOMIZE_UNMOUNT_REQ {
  optional uint32 customizeType = 1;
  optional string customizeId = 2;
}

message SS2C_CUSTOMIZE_UNMOUNT_RES {
  optional uint32 result = 1;
  optional uint32 customizeType = 2;
  repeated .DC.Packet.SCUSTOMIZE_BASE_INFO infos = 3;
}

message SC2S_CUSTOMIZE_NEW_ITEM_CHECK_REQ {
  optional string itemId = 1;
}

message SS2C_CUSTOMIZE_NEW_ITEM_CHECK_RES {
}

message SS2C_CUSTOMIZE_NEW_ITEM_ALERT_NOT {
}

message SC2S_CUSTOMIZE_UPDATE_SKIN_ICON_TYPE_REQ {
  optional uint32 skinIconType = 1;
}

message SS2C_CUSTOMIZE_UPDATE_SKIN_ICON_TYPE_RES {
  optional uint32 result = 1;
}

message SC2S_CUSTOMIZE_ARENA_RANK_CONTENT_TOGGLE_REQ {
  enum CONTENT {
    NONE = 0;
    PORTRAIT = 1;
    NAMEPLATE_FRAME = 2;
  }
  optional uint32 contentType = 1;
  optional uint32 toggleStatus = 2;
}

message SS2C_CUSTOMIZE_ARENA_RANK_CONTENT_TOGGLE_RES {
  optional uint32 result = 1;
  optional uint32 contentType = 2;
  optional uint32 toggleStatus = 3;
}
