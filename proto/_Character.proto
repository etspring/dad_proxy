syntax = "proto2";

import "_Item.proto";
package DC.Packet;
option go_package = "dad_proxy/internal/pb";

enum Friend_Location {
  Friend_Location_NONE = 0;
  Friend_Location_LOBBY = 1;
  Friend_Location_DUNGEON = 2;
  Friend_Location_OFFLINE = 3;
}
message SCHARACTER_RANK_INFO {
  optional uint32 gameType = 1;
  optional string rankId = 2;
}

message SSTORAGE_INFO {
  optional uint32 inventoryId = 1;
  repeated .DC.Packet.SItem CharacterStorageItemList = 2;
  optional int32 storageStatus = 3;
}

message SCHARACTER_INFO {
  optional string accountId = 1;
  optional string accountNickname = 2;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 3;
  optional string characterClass = 4;
  optional string characterId = 5;
  optional uint32 gender = 6;
  optional uint32 level = 7;
  optional string serviceGrpc = 8;
  repeated .DC.Packet.SItem CharacterItemList = 9;
  repeated .DC.Packet.SItem CharacterStorageItemList = 10;
  repeated .DC.Packet.SSTORAGE_INFO CharacterStorageInfos = 11;
  repeated .DC.Packet.SCHARACTER_RANK_INFO rankInfos = 12;
}

message SCHARACTER_FRIEND_INFO {
  optional string accountId = 1;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 2;
  optional string characterClass = 3;
  optional string characterId = 4;
  optional uint32 gender = 5;
  optional uint32 level = 6;
  optional uint32 locationStatus = 7;
  optional uint32 PartyMemeberCount = 8;
  optional uint32 PartyMaxMemeberCount = 9;
}

message SCHARACTER_PARTY_INFO {
  optional string accountId = 1;
  optional string accountNickname = 2;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 3;
  optional string characterClass = 4;
  optional string characterId = 5;
  optional uint32 gender = 6;
  optional uint32 level = 7;
  optional uint32 isPartyLeader = 8;
  optional uint32 isReady = 9;
  optional uint32 isInGame = 10;
  repeated .DC.Packet.SItem equipItemList = 11;
  optional uint32 partyIdx = 12;
  repeated .DC.Packet.SPerk perks = 13;
  optional uint32 gearScore = 14;
  optional string lobbySkinId = 15;
  optional uint32 mmrRating = 16;
  optional uint32 remainPlacementCount = 17;
  repeated .DC.Packet.SCHARACTER_RANK_INFO rankInfos = 18;
  optional uint32 isOutlaw = 19;
}

message SCHARACTER_TRADE_INFO {
  optional string accountId = 1;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 2;
  optional string characterClass = 3;
  optional string characterId = 4;
  optional uint32 gender = 5;
  optional uint32 level = 6;
  optional uint32 characterLocation = 7;
}

message SACCOUNT_NICKNAME {
  optional string originalNickName = 1;
  optional string streamingModeNickName = 2;
  optional int32 karmaRating = 3;
  optional string rankId = 4;
  optional uint32 fame = 5;
  optional string nameplateSkinId = 6;
  optional uint32 rankIconType = 7;
  optional string adventureRankId = 8;
  optional string arenaRankId = 9;
  optional string previousSeasonArenaRankId = 10;
  optional uint32 nameplateFrameEnable = 11;
  optional uint32 portraitEnable = 12;
  optional string previousSeasonSoloDuoArenaRankId = 13;
}

message SBLOCK_CHARACTER {
  optional string accountId = 1;
  optional string characterId = 2;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 3;
  optional string characterClass = 4;
  optional uint32 gender = 5;
}

message SCHARACTER_GATHERING_HALL_INFO {
  optional string accountId = 1;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 2;
  optional string characterClass = 3;
  optional string characterId = 4;
  optional uint32 gender = 5;
  optional uint32 level = 6;
}

message SCHARACTER_PARTY_FINDER_INFO {
  optional string accountId = 1;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 2;
  optional string characterClass = 3;
  optional string characterId = 4;
  optional uint32 gender = 5;
  optional uint32 level = 6;
  optional uint32 isPartyLeader = 7;
}

message SCHARACTER_GATHERING_HALL_BANNED_INFO {
  optional string accountId = 1;
  optional string accountNickname = 2;
}

message SGameStat {
  optional int32 statType = 1;
  optional int32 statValue = 2;
}

message SRankUserInfo {
  optional string rankId = 1;
  optional uint32 currentPoint = 2;
  optional uint32 needPoint = 3;
  optional string sheetId = 4;
}

message SCHARACTER_LAST_GAME_INFO {
  optional string accountId = 1;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 2;
  optional string characterId = 3;
  optional string characterClass = 4;
  optional int32 gender = 5;
}

message SArenaUserStat {
  optional int32 kill = 1;
  optional int32 death = 2;
  optional int32 assist = 3;
  optional double headshot = 4;
  optional int32 totalDamage = 5;
  optional int32 totalHealing = 6;
}

message SArenaGameResultRecord {
  optional int32 teamType = 1;
  optional uint64 characterId = 2;
  optional string characterClass = 3;
  optional string characterNickname = 4;
  optional string streamingModeNickName = 5;
  optional .DC.Packet.SArenaUserStat stat = 6;
  optional int32 isSurrender = 7;
}
