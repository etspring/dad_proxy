message SS2C_MERCHANT_REWARD_ITEM_LIST_RES {
  optional uint32 result = 1;
  optional uint32 loopMessageFlag = 2;
  repeated .DC.Packet.SMERCHANT_STOCK_BUY_ITEM_INFO stockList = 3;
