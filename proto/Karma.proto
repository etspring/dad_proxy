syntax = "proto2";

import "_Character.proto";
package DC.Packet;
option go_package = "dad_proxy/internal/pb";

message SKARMA_CHARACTER_INFO {
  optional string accountId = 1;
  optional string characterId = 2;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 3;
  optional string characterClass = 4;
  optional uint32 gender = 5;
  optional uint32 isVote = 6;
  optional uint32 karmaAction = 7;
  optional uint32 karmaStatus = 8;
}

message SKARMA_MOST_RECENT_MATCH_INFO {
  optional uint32 matchIdx = 1;
  repeated .DC.Packet.SKARMA_CHARACTER_INFO characterInfos = 2;
}

message SC2S_KARMA_REPORT_LIST_REQ {
}

message SS2C_KARMA_REPORT_LIST_RES {
  repeated .DC.Packet.SKARMA_MOST_RECENT_MATCH_INFO matchInfos = 1;
  optional uint32 currentTicketCount = 2;
  optional uint32 collectionStepCount = 3;
  optional uint32 maxCollectionCount = 4;
  optional uint32 maxTicketCount = 5;
}

message SC2S_KARMA_REPORT_ACTION_REQ {
  optional uint32 matchIdx = 1;
  optional string accountId = 2;
  optional string characterId = 3;
  optional uint32 action = 4;
}

message SS2C_KARMA_REPORT_ACTION_RES {
  optional uint32 result = 1;
  optional uint32 matchIdx = 2;
  optional .DC.Packet.SKARMA_CHARACTER_INFO updateCharacterInfo = 3;
  optional uint32 currentTicketCount = 4;
  optional uint32 collectionStepCount = 5;
  optional uint32 maxCollectionCount = 6;
  optional uint32 maxTicketCount = 7;
}

message SS2C_KARMA_RATING_UPDATE_NOT {
  optional int32 updateKarmaRating = 1;
  optional string accountId = 2;
  optional string characterId = 3;
}
