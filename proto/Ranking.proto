syntax = "proto2";

import "_Character.proto";
import "Shop.proto";
package DC.Packet;
option go_package = "dad_proxy/internal/pb";

enum RANKING_TYPE {
  NONE = 0;
  TreasureCollector = 1;
  KillerOutlaw = 2;
  EscapeArtist = 3;
  VeteranAdventurer = 4;
  Slayer_Lich = 5;
  Slayer_GhostKing = 6;
  Slayer_SkeletonWarlord = 7;
  Slayer_CaveTroll = 8;
  Slayer_BossAll = 9;
  Arena = 10;
  Slayer_CaveDweller = 11;
  Slayer_GhostHunter = 12;
  Slayer_WyvernSlayer = 13;
}
enum CONTENT_TYPE {
  NONE_CONTENT = 0;
  TREASURE_COLLECTOR = 1;
  KILLER_OUTLAW = 2;
  ESCAPE_ARTIST = 3;
  VETERAN_ADVENTURER = 4;
  SLAYER = 5;
  ARENA = 6;
}
message SC2S_RANKING_INFO_REQ {
}

message SRANKING_REWARD_INFO {
  enum REWARD_STATE {
    REWARD_STATE_NONE = 0;
    ACTIVE = 1;
    RECEIVED = 2;
    FINISHED = 3;
  }
  optional string groupId = 1;
  optional int32 rewardState = 2;
  optional string sheetId = 3;
}

message SRANKING_PERIOD_INFO {
  optional string sheetId = 1;
  optional uint32 periodIndex = 2;
  optional uint64 remainTimeSec = 3;
}

message SRANKING_INFO {
  enum STATE {
    NONE = 0;
    PRESEASON = 1;
    SEASON = 2;
  }
  optional string seasonId = 2;
  optional string beginDate = 3;
  optional string beginTime = 4;
  optional string endDate = 5;
  optional string endTime = 6;
  optional string wipeDate = 7;
  optional string wipeTime = 8;
  optional string rewardDate = 9;
  optional string rewardTime = 10;
  repeated .DC.Packet.SRankUserInfo rankInfo = 11;
  repeated .DC.Packet.SRANKING_REWARD_INFO rewardInfos = 12;
  repeated .DC.Packet.SRANKING_PERIOD_INFO periodInfos = 13;
  repeated string dungeonIdTags = 14;
}

message SS2C_RANKING_INFO_RES {
  repeated .DC.Packet.SRANKING_INFO rankingInfos = 1;
  optional string currentDate = 2;
  optional string currentTime = 3;
}

message SRankRecord {
  optional uint32 pageIndex = 1;
  optional uint32 rank = 2;
  optional uint32 score = 3;
  optional float percentage = 4;
  optional string accountId = 5;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 6;
  optional string characterClass = 7;
  optional string characterId = 8;
}

message SC2S_RANKING_RANGE_REQ {
  optional string seasonId = 1;
  optional string sheetId = 2;
  optional string contentId = 3;
  optional uint32 periodIndex = 4;
  optional uint32 startIndex = 5;
  optional uint32 endIndex = 6;
  optional string characterClass = 7;
}

message SS2C_RANKING_RANGE_RES {
  optional uint32 result = 1;
  optional string seasonId = 2;
  repeated .DC.Packet.SRankRecord records = 3;
  optional string sheetId = 4;
  optional string contentId = 5;
  optional uint32 periodIndex = 6;
  optional uint32 allRowCount = 7;
  optional uint32 startIndex = 8;
  optional uint32 endIndex = 9;
  optional string characterClass = 10;
}

message SC2S_RANKING_CHARACTER_REQ {
  optional string seasonId = 1;
  optional string sheetId = 2;
  optional string contentId = 3;
  optional uint32 periodIndex = 4;
  optional .DC.Packet.SACCOUNT_NICKNAME nickName = 5;
  optional string characterClass = 6;
}

message SC2S_RANKING_REWARD_GET_REQ {
  optional string seasonId = 1;
  optional string groupId = 2;
  optional string sheetId = 3;
}

message SS2C_RANKING_REWARD_GET_RES {
  optional int32 result = 1;
}

message SS2C_RANKING_CHARACTER_RES {
  optional uint32 result = 1;
  optional string seasonId = 2;
  optional .DC.Packet.SRankRecord rankRecord = 3;
  optional string sheetId = 4;
  optional string contentId = 5;
  optional uint32 periodIndex = 6;
  optional uint32 allRowCount = 7;
  optional string characterClass = 8;
  optional uint32 playGameCount = 9;
  optional uint32 placementGameCount = 10;
  optional uint32 mmrRating = 11;
}

message SC2S_RANKING_AP_CONFIG_REQ {
  optional string seasonId = 1;
  optional string sheetId = 2;
  optional string dungeonIdTag = 3;
}

message SRANKING_AP_CONFIG_RECORD {
  optional string rankId = 1;
  optional int32 requiredTotalAP = 2;
  optional int32 requiredTopRank = 3;
}

message SRANKING_EF_CONFIG_RECORD {
  optional string rankEFId = 1;
  optional int32 entranceFee = 2;
}

message SS2C_RANKING_AP_CONFIG_RES {
  optional string seasonId = 1;
  optional string sheetId = 2;
  optional string dungeonIdTag = 3;
  repeated .DC.Packet.SRANKING_AP_CONFIG_RECORD apRecords = 4;
  repeated .DC.Packet.SRANKING_EF_CONFIG_RECORD efRecords = 5;
}

message SS2C_RANKING_HAS_REWARD_NOT {
  optional int32 isHasReward = 1;
}

message SS2C_RANK_AUTOMATIC_REWARD_NOT {
  optional uint32 result = 1;
  repeated .DC.Packet.SREWARD_INFO rewards = 2;
}
