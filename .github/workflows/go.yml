name: Go Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Go mod
      run: go mod download

    - name: Build
      env:
        CGO_ENABLED: 0
      run: go build -ldflags="-s -w" -o dad_proxy ./cmd/dad_proxy

    - name: Verify static Linux binary
      run: |
        file dad_proxy
        ldd dad_proxy 2>&1 | grep -q 'not a dynamic executable'
